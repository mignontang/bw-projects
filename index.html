<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專案管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f7f6f3;--surface:#ffffff;--surface2:#f0efe9;
--text:#1a1917;--text2:#6b6a65;--text3:#a8a7a2;
--border:#e2e0d8;--border2:#cccac0;
--blue:#2563eb;--blue-bg:#eff6ff;--blue-text:#1e40af;
--green:#16a34a;--green-bg:#f0fdf4;--green-text:#15803d;
--amber:#d97706;--amber-bg:#fffbeb;--amber-text:#92400e;
--red:#dc2626;--red-bg:#fef2f2;--red-text:#991b1b;
--purple:#7c3aed;--purple-bg:#f5f3ff;--purple-text:#5b21b6;
--teal:#0d9488;--teal-bg:#f0fdfa;--teal-text:#0f766e;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
button{font-family:'Noto Sans TC',sans-serif;cursor:pointer;font-size:13px}

.app{display:flex;min-height:100vh}

.sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-size:15px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;font-weight:400;transition:all 0.15s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:#1a1917;color:#fff}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:0.08em;padding:16px 12px 6px;text-transform:uppercase}

.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:500;color:var(--text)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:500;transition:all 0.15s}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn-primary{background:#1a1917;color:#fff;border-color:#1a1917}
.btn-primary:hover{background:#333}
.btn-sm{padding:5px 10px;font-size:12px}

.content{flex:1;overflow-y:auto;padding:24px}

.view{display:none}
.view.active{display:block}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-label{font-size:11px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
.stat-value{font-size:26px;font-weight:700;color:var(--text);margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:-1px}
.stat-sub{font-size:12px;color:var(--text2);margin-top:2px}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.project-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;cursor:pointer;transition:all 0.15s}
.project-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:500;color:var(--text);line-height:1.4}
.card-client{font-size:12px;color:var(--text3);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-purple{background:var(--purple-bg);color:var(--purple-text)}
.badge-teal{background:var(--teal-bg);color:var(--teal-text)}
.badge-gray{background:var(--surface2);color:var(--text2)}

.progress-wrap{margin:14px 0 10px}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:5px}
.progress-bar{height:5px;background:var(--surface2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:#1a1917;border-radius:99px;transition:width 0.4s}
.progress-fill.danger{background:var(--red)}
.progress-fill.warning{background:var(--amber)}
.progress-fill.success{background:var(--green)}

.card-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.card-dates{display:flex;align-items:center;gap:4px}
.card-tasks{font-weight:500;color:var(--text2)}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:16px;font-weight:500;color:var(--text)}

.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start}
.kanban-col{background:var(--surface2);border-radius:12px;padding:14px}
.kanban-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kanban-col-title{font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em}
.kanban-count{background:var(--surface);border:1px solid var(--border);border-radius:99px;font-size:11px;padding:1px 7px;color:var(--text2);font-family:'DM Mono',monospace}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;margin-bottom:8px;cursor:pointer;transition:all 0.15s}
.kanban-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.kanban-card-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px}
.kanban-card-meta{font-size:11px;color:var(--text3)}

.gantt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.gantt-header{display:grid;border-bottom:1px solid var(--border);background:var(--surface2)}
.gantt-body{}
.gantt-row{display:grid;border-bottom:1px solid var(--border);align-items:center}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:var(--surface2)}
.gantt-label{padding:10px 16px;font-size:13px;border-right:1px solid var(--border);overflow:hidden}
.gantt-label-title{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-label-sub{font-size:11px;color:var(--text3)}
.gantt-timeline{position:relative;padding:8px 0}
.gantt-month{text-align:center;font-size:11px;color:var(--text3);padding:8px 4px;border-right:1px solid var(--border);font-family:'DM Mono',monospace;font-weight:500}
.gantt-cell{border-right:1px solid var(--border);position:relative;height:40px}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:0.6;z-index:2}
.gantt-bar{position:absolute;top:8px;height:24px;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;z-index:1;transition:opacity 0.15s}
.gantt-bar:hover{opacity:0.85}

.tasks-table{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.tasks-table table{width:100%;border-collapse:collapse;table-layout:fixed}
.tasks-table th{padding:10px 14px;font-size:11px;font-weight:500;color:var(--text3);text-align:left;text-transform:uppercase;letter-spacing:0.06em;background:var(--surface2);border-bottom:1px solid var(--border)}
.tasks-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.tasks-table tr:last-child td{border-bottom:none}
.tasks-table tr:hover td{background:var(--surface2)}
.overdue-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}

.empty{text-align:center;padding:48px;color:var(--text3);font-size:13px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:24px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:500;margin-bottom:18px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--text)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
#lock-screen{display:flex;position:fixed;inset:0;background:#f7f6f3;z-index:9999;align-items:center;justify-content:center}
#lock-screen.hidden{display:none!important}
#app-wrap{display:none}
#app-wrap.visible{display:block}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div id="lock-screen">
  <div style="background:#fff;border:1px solid #e2e0d8;border-radius:16px;padding:40px 48px;width:340px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08)">
    <div style="font-size:32px;margin-bottom:16px">🔐</div>
    <h2 style="font-size:18px;font-weight:600;color:#1a1917;margin-bottom:6px">BW 專案管理系統</h2>
    <p style="font-size:13px;color:#a8a7a2;margin-bottom:24px">請輸入通關密碼以繼續</p>
    <input id="pw-input" type="password" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')checkPw()"
      style="width:100%;padding:10px 14px;border:1.5px solid #e2e0d8;border-radius:8px;font-size:14px;font-family:'Noto Sans TC',sans-serif;outline:none;margin-bottom:10px;text-align:center;letter-spacing:2px">
    <div id="pw-error" style="font-size:12px;color:#dc2626;height:16px;margin-bottom:8px"></div>
    <button onclick="checkPw()" style="width:100%;padding:10px;background:#1a1917;color:#fff;border:none;border-radius:8px;font-size:14px;font-family:'Noto Sans TC',sans-serif;font-weight:500;cursor:pointer">進入系統</button>
  </div>
</div>

<div id="app-wrap">
<div class="app">
<aside class="sidebar">
  <div class="sidebar-logo">
    <h1>專案管理系統</h1>
    <p>BW Media Projects</p>
    <a href="https://docs.google.com/spreadsheets/d/10AWepUMaLek8MJvoBmp5v7jALbyYkzRYQ-Wu1BSuXfo" target="_blank" style="font-size:10px;color:var(--text3);text-decoration:none;display:flex;align-items:center;gap:3px;margin-top:4px">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Google Sheets
    </a>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">主要</div>
    <button class="nav-item active" onclick="showView('overview')" id="nav-overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      專案總覽
    </button>
    <button class="nav-item" onclick="showView('kanban')" id="nav-kanban">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="4" height="18" rx="1"/><rect x="10" y="3" width="4" height="13" rx="1"/><rect x="17" y="3" width="4" height="16" rx="1"/></svg>
      看板
    </button>
    <button class="nav-item" onclick="showView('gantt')" id="nav-gantt">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/><line x1="6" y1="3" x2="6" y2="9" stroke-width="3"/><line x1="12" y1="9" x2="12" y2="15" stroke-width="3"/><line x1="18" y1="6" x2="18" y2="21" stroke-width="3"/></svg>
      甘特圖
    </button>
    <button class="nav-item" onclick="showView('tasks')" id="nav-tasks">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      任務列表
    </button>
  </nav>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-title" id="topbar-title">專案總覽</span>
    <div class="topbar-actions" style="display:flex;align-items:center;gap:10px">
      <span id="sync-status"><span style="color:var(--text3);font-size:11px">🔄 連線中…</span></span>
      <button class="btn btn-sm" onclick="manualSync()" title="從 Google Sheets 重新載入">↻ 同步</button>
      <button class="btn btn-sm" onclick="openModal('import')">📥 匯入任務</button>
      <button class="btn btn-sm" onclick="openModal('project')">+ 新增專案</button>
    </div>
  </div>

  <div class="content">

    <div class="view active" id="view-overview">
      <div class="stats-row" id="stats-row"></div>
      <div class="section-header">
        <span class="section-title">所有專案</span>
      </div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>

    <div class="view" id="view-kanban">
      <div class="kanban" id="kanban-board"></div>
    </div>

    <div class="view" id="view-gantt">
      <div class="gantt-wrap" id="gantt-wrap"></div>
    </div>

    <div class="view" id="view-tasks">
      <div class="section-header">
        <span class="section-title">任務列表</span>
        <div style="display:flex;gap:8px">
          <select id="task-filter-project" onchange="renderTasks()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);color:var(--text)">
            <option value="">全部專案</option>
          </select>
          <select id="task-filter-status" onchange="renderTasks()" style="padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface);color:var(--text)">
            <option value="">全部狀態</option>
            <option value="pending">待執行</option>
            <option value="doing">本週進行中</option>
            <option value="done">已完成</option>
          </select>
        </div>
      </div>
      <div class="tasks-table" id="tasks-table"></div>
    </div>

  </div>
</div>
</div>
</div><!-- end app-wrap -->

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

// ── 雲端儲存（JSONP 模式，繞過 CORS）──────────────────
function loadLocalCache(){
  try{const s=localStorage.getItem('bw_pm_v1');return s?JSON.parse(s):null;}catch(e){return null;}
}
function saveLocalCache(d){
  try{localStorage.setItem('bw_pm_v1',JSON.stringify(d));}catch(e){}
}

// ── 雲端儲存（JSONP，繞過 CORS）──────────────────────────
function jsonpRequest(url, timeoutMs){
  return new Promise((resolve,reject)=>{
    const cbName='_bwcb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const script=document.createElement('script');
    const timer=setTimeout(()=>{
      cleanup();reject(new Error('timeout'));
    }, timeoutMs||15000);
    function cleanup(){
      clearTimeout(timer);
      try{delete window[cbName];}catch(e){}
      if(script.parentNode)script.parentNode.removeChild(script);
    }
    window[cbName]=function(result){cleanup();resolve(result);};
    // 強制加 callback 參數
    const sep=url.includes('?')?'&':'?';
    script.src=url+sep+'callback='+cbName+'&t='+Date.now();
    script.onerror=function(e){cleanup();reject(new Error('script load error'));};
    document.head.appendChild(script);
  });
}

async function loadFromCloud(){
  showSyncStatus('loading');
  try{
    const json=await jsonpRequest(API_URL+'?action=getData');
    if(json&&json.projects&&json.projects.length>0){
      data.projects=json.projects;
      data.tasks=json.tasks||[];
      sanitizeDates(data);
      data.projects=data.projects.map(p=>({...p,stage:p.stage==='前置規劃'?'執行中':p.stage}));
      saveLocalCache(data);
      showSyncStatus('ok');
      return true;
    }else{
      // 雲端空的，推本地資料上去
      await saveToCloud(data);
      showSyncStatus('ok');
      return true;
    }
  }catch(e){
    console.warn('Cloud load failed:',e.message);
    showSyncStatus('offline');
    return false;
  }
}

let saveQueue=null;let saveTimer=null;
async function saveData(d){
  saveLocalCache(d);
  saveQueue=d;
  if(saveTimer)clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    if(!saveQueue)return;
    const toSave=sanitizeDates(JSON.parse(JSON.stringify(saveQueue)));
    saveQueue=null;
    if(isSyncing)return;
    isSyncing=true;
    showSyncStatus('saving');
    try{
      await saveToCloud(toSave);
      showSyncStatus('ok');
    }catch(e){
      console.warn('Save failed:',e.message);
      showSyncStatus('offline');
    }finally{isSyncing=false;}
  },800);
}

async function saveToCloud(d){
  const clean=sanitizeDates(JSON.parse(JSON.stringify(d)));
  // 分批寫入：先存 projects，再存 tasks
  // 用 JSONP GET 方式，繞過 CORS
  const pEncoded=encodeURIComponent(JSON.stringify({action:'saveData',data:{projects:clean.projects,tasks:[]}}));
  const tEncoded=encodeURIComponent(JSON.stringify({action:'saveData',data:clean}));
  // 資料量小用 JSONP，大的用 image beacon（fire-and-forget）
  try{
    if(tEncoded.length<8000){
      await jsonpRequest(API_URL+'?method=post&body='+tEncoded,25000);
    }else{
      // 分兩批：先存 projects
      await jsonpRequest(API_URL+'?method=post&body='+pEncoded,15000);
      // 再存全部（覆寫）
      // 把 tasks 分批，每批 20 筆
      const batchSize=20;
      for(let i=0;i<clean.tasks.length;i+=batchSize){
        const batch=clean.tasks.slice(0,i+batchSize);// 累積存
        const bEncoded=encodeURIComponent(JSON.stringify({action:'saveData',data:{projects:clean.projects,tasks:batch}}));
        await jsonpRequest(API_URL+'?method=post&body='+bEncoded,20000);
      }
    }
  }catch(e){
    console.warn('saveToCloud error:',e.message);
    throw e;
  }
}

function showSyncStatus(state){
  const el=document.getElementById('sync-status');
  if(!el)return;
  const states={
    loading:{text:'讀取中…',color:'var(--text3)',dot:'🔄'},
    saving:{text:'儲存中…',color:'var(--amber)',dot:'🔄'},
    ok:{text:'已同步 Google Sheets',color:'var(--green)',dot:'✅'},
    offline:{text:'離線模式（本地快取）',color:'var(--amber)',dot:'⚠️'}
  };
  const s=states[state]||states.ok;
  el.innerHTML=`<span style="color:${s.color};font-size:11px">${s.dot} ${s.text}</span>`;
}

function getTotalCount(pid){return data.tasks.filter(t=>t.pid===pid).length;}

function isOverdue(dateStr,status){
  if(status==='done')return false;
  const d=new Date(dateStr);const now=new Date();
  d.setHours(23,59,59);return d<now;
}
function daysUntil(dateStr){
  const d=new Date(dateStr);const now=new Date();
  now.setHours(0,0,0,0);d.setHours(0,0,0,0);
  return Math.round((d-now)/(1000*60*60*24));
}
function formatDate(s){
  if(!s)return'';
  const clean=toDateStr(s);
  if(!clean||!clean.includes('-'))return s;
  const[y,m,dd]=clean.split('-');
  return`${parseInt(m)}/${parseInt(dd)}`;
}
function formatDateFull(s){
  if(!s)return'';
  const clean=toDateStr(s);
  if(!clean||!clean.includes('-'))return s;
  const[y,m,dd]=clean.split('-');
  return`${y}/${m}/${dd}`;
}
function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2);}

// 把任何日期格式統一轉成 YYYY-MM-DD
function toDateStr(val){
  if(!val)return'';
  if(typeof val==='string'){
    // 已經是 YYYY-MM-DD
    if(/^\d{4}-\d{2}-\d{2}$/.test(val))return val;
    // Date 物件的 toString 格式
    const d=new Date(val);
    if(!isNaN(d)){
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }
  }
  return String(val);
}
// 清理整個 data 物件的日期欄位
function sanitizeDates(d){
  d.projects=d.projects.map(p=>({...p,
    start:toDateStr(p.start),
    end:toDateStr(p.end)
  }));
  d.tasks=d.tasks.map(t=>({...t,
    date:toDateStr(t.date),
    originalDate:t.originalDate?toDateStr(t.originalDate):''
  }));
  return d;
}

function getProgressColor(pct){
  if(pct>=80)return'success';

function getNextWeekRange(){
  const{fri}=getThisWeekRange();
  const mon=new Date(fri);mon.setDate(fri.getDate()+3);mon.setHours(0,0,0,0);
  const nextFri=new Date(mon);nextFri.setDate(mon.getDate()+4);nextFri.setHours(23,59,59,999);
  return{mon,fri:nextFri};
}
function isNextWeek(dateStr){
  const d=new Date(dateStr);const{mon,fri}=getNextWeekRange();

  wrap.innerHTML=`

  function initGanttScroll(){
    const gs=document.getElementById('gantt-scroll');
    if(!gs)return;
    const todayPx=dayLeft(today);
    const viewable=gs.clientWidth - LABEL_W;
    gs.scrollLeft=Math.max(0, todayPx - viewable/2);
    // 防止重複綁定
    if(gs._dragBound)return;
    gs._dragBound=true;
    let isDragging=false,startX=0,startScroll=0;
    gs.addEventListener('mousedown',e=>{if(e.target.closest('[onclick]'))return;isDragging=true;startX=e.pageX;startScroll=gs.scrollLeft;gs.style.cursor='grabbing';e.preventDefault();});
    window.addEventListener('mousemove',e=>{if(!isDragging)return;const dx=e.pageX-startX;gs.scrollLeft=startScroll-dx;});
    window.addEventListener('mouseup',()=>{isDragging=false;if(gs)gs.style.cursor='grab';});
    // 觸控支援
    gs.addEventListener('touchstart',e=>{startX=e.touches[0].pageX;startScroll=gs.scrollLeft;},{passive:true});
    gs.addEventListener('touchmove',e=>{gs.scrollLeft=startScroll-(e.touches[0].pageX-startX);},{passive:true});
  }
  // 多次嘗試確保捲動到位（等待 DOM 渲染完畢）
  [80,200,500].forEach(ms=>setTimeout(()=>{
    const gs=document.getElementById('gantt-scroll');
    if(gs&&!gs._centered){
      const todayPx=dayLeft(today);
      const viewable=gs.clientWidth-LABEL_W;
      if(viewable>0){gs.scrollLeft=Math.max(0,todayPx-viewable/2);gs._centered=true;}
    }
    initGanttScroll();
  },ms));
  window.addEventListener('resize',()=>{
    const gs=document.getElementById('gantt-scroll');
    if(gs){gs._centered=false;const todayPx=dayLeft(today);gs.scrollLeft=Math.max(0,todayPx-(gs.clientWidth-LABEL_W)/2);}
  });
}

function getThisWeekRange(){
  const now=new Date();
  const day=now.getDay();
  const diffToMon=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diffToMon);mon.setHours(0,0,0,0);
  const fri=new Date(mon);fri.setDate(mon.getDate()+4);fri.setHours(23,59,59,999);
  return{mon,fri};
}
function isThisWeek(dateStr){
  const d=new Date(dateStr);const{mon,fri}=getThisWeekRange();
  return d>=mon&&d<=fri;
}
function getAutoStatus(t){
  if(t.status==='done')return'done';
  if(isThisWeek(t.date))return'doing';
  return'pending';
}
function getTimeProgress(dateStr){
  const d=new Date(dateStr);const now=new Date();
  now.setHours(0,0,0,0);d.setHours(0,0,0,0);
  const diff=Math.round((d-now)/(1000*60*60*24));
  if(diff<0)return{label:`逾期 ${Math.abs(diff)} 天`,color:'var(--red)',icon:'⚠'};
  if(diff===0)return{label:'今天截止',color:'var(--red)',icon:'!'};
  if(diff<=3)return{label:`${diff} 天後`,color:'var(--red)',icon:'!'};
  if(diff<=7)return{label:`${diff} 天後`,color:'var(--amber)',icon:'~'};
  if(diff<=14)return{label:`${diff} 天後`,color:'var(--amber)',icon:''};
  return{label:`${diff} 天後`,color:'var(--text3)',icon:''};
}

async function manualSync(){
  showSyncStatus('saving');
  // 先把本地推上去，再拉回合併，避免覆蓋本地新資料
  try{await saveToCloud(data);}catch(e){console.warn('Pre-sync push failed:',e.message);}
  showSyncStatus('loading');
  try{
    const json=await jsonpRequest(API_URL+'?action=getData');
    if(json&&json.projects&&json.projects.length>0){
      // 合併：雲端資料 + 本地獨有的新增項目
      const cloudPIds=new Set(json.projects.map(p=>p.id));
      const cloudTIds=new Set(json.tasks.map(t=>t.id));
      const localNewP=data.projects.filter(p=>!cloudPIds.has(p.id));
      const localNewT=data.tasks.filter(t=>!cloudTIds.has(t.id));
      data.projects=[...json.projects,...localNewP];
      data.tasks=[...json.tasks,...localNewT];
      sanitizeDates(data);
      data.projects=data.projects.map(p=>({...p,stage:p.stage==='前置規劃'?'執行中':p.stage}));
      saveLocalCache(data);
      if(localNewP.length||localNewT.length){
        // 有新增資料，推回雲端
        await saveToCloud(data);
      }
      showSyncStatus('ok');
      renderAll();
    }
  }catch(e){
    console.warn('Sync failed:',e.message);
    showSyncStatus('offline');
  }
}

function saveProject(id){
  const name=document.getElementById('m-name').value.trim();

function saveTask(id){
  const name=document.getElementById('m-tname').value.trim();
  const pid=document.getElementById('m-tpid').value;
  const date=document.getElementById('m-tdate').value;
  const status=document.getElementById('m-tstatus')?document.getElementById('m-tstatus').value:'pending';
  if(!name){alert('請輸入任務名稱');return;}
  const cleanDate=toDateStr(date);
  if(id){
    const t=data.tasks.find(x=>x.id===id);
    if(t){
      if(cleanDate&&cleanDate!==t.date&&!t.originalDate){t.originalDate=t.date;}

    }
  }else{
    data.tasks.push({id:uid(),pid,name,type:'其他',date:cleanDate,status:'pending',priority:'mid'});
  }

// 解析各種日期+任務名稱格式
function parseLineDate(line){
  line=line.trim();
  if(!line)return null;
  const year=2026;

  // 格式A：4/20（一）任務名稱 / 4/20(一)任務名稱
  let m=line.match(/^(\d{1,2})\/(\d{1,2})\s*[（(][^）)]*[）)]\s*(.+)$/u);
  if(m){
    const mo=String(parseInt(m[1])).padStart(2,'0');
    const d=String(parseInt(m[2])).padStart(2,'0');
    const name=m[3].replace(/\s*or\s*\d+[（(][^）)]*[）)]/gu,'').trim();
    if(name)return{date:`${year}-${mo}-${d}`,name};
  }
  // 格式B：4/20 任務名稱（無括號星期）
  m=line.match(/^(\d{1,2})\/(\d{1,2})\s+(.+)$/);
  if(m){
    const mo=String(parseInt(m[1])).padStart(2,'0');
    const d=String(parseInt(m[2])).padStart(2,'0');
    const name=m[3].replace(/\s*or\s*\d+[（(][^）)]*[）)]/gu,'').trim();
    if(name)return{date:`${year}-${mo}-${d}`,name};
  }
  // 格式C：YYYY-MM-DD 任務名稱
  m=line.match(/^(\d{4}-\d{2}-\d{2})\s+(.+)$/);
  if(m)return{date:m[1],name:m[2].trim()};
  return null;
}

function parseImportText(){
  const pid=document.getElementById('m-import-pid').value;
  const text=document.getElementById('m-import-text').value.trim();
  const lines=text.split('\n').filter(l=>l.trim());
  const tasks=[];const errors=[];
  lines.forEach((line,i)=>{
    const r=parseLineDate(line);
    if(!r){errors.push(`第${i+1}行無法解析：${line}`);return;}
    tasks.push({id:uid(),pid,name:r.name,type:'其他',date:r.date,status:'pending',priority:'mid'});
  });
  return{tasks,errors};
}

// Excel 日期序號轉 YYYY-MM-DD（Excel epoch 1900-01-01 = 1）
function excelDateToStr(serial){
  if(!serial||isNaN(serial))return'';
  const d=new Date((Number(serial)-25569)*86400*1000);
  const y=d.getUTCFullYear();const mo=String(d.getUTCMonth()+1).padStart(2,'0');const dd=String(d.getUTCDate()).padStart(2,'0');
  return`${y}-${mo}-${dd}`;
}

let _excelParsedTasks=[];
function handleExcelFile(file){
  if(!file)return;
  const el=document.getElementById('excel-parse-result');
  el.innerHTML='<span style="color:var(--text3)">讀取中…</span>';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const XLSX=window.XLSX;
      if(!XLSX){el.innerHTML='<span style="color:var(--red)">❌ 請稍候，XLSX 函式庫載入中…</span>';return;}
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const pid=document.getElementById('m-import-pid').value;
      const tasks=[];
      // 找 Due 欄位（第3欄，index 2）和任務名稱（第1欄，index 0）
      let headerRow=-1;
      rows.forEach((r,i)=>{if(String(r[0]).includes('Project Content')||String(r[1]).includes('Start'))headerRow=i;});
      const dataStart=headerRow>=0?headerRow+1:2;
      rows.slice(dataStart).forEach(r=>{
        const name=String(r[0]||'').trim();
        const due=r[2];// Due 欄
        if(!name||name.startsWith('※')||name.startsWith('*'))return;
        let dateStr='';
        if(due&&!isNaN(Number(due)))dateStr=excelDateToStr(Number(due));
        else if(due&&String(due).includes('-'))dateStr=toDateStr(String(due));
        else if(due&&String(due).match(/\d{4}\/\d+\/\d+/))dateStr=toDateStr(String(due));
        if(!name||!dateStr)return;
        tasks.push({id:uid(),pid,name,type:'其他',date:dateStr,status:'pending',priority:'mid'});
      });
      _excelParsedTasks=tasks;
      if(tasks.length){
        el.innerHTML=`<div style="background:var(--green-bg);border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;color:var(--green-text)">✅ 解析成功，共 ${tasks.length} 筆任務<br>${tasks.map(t=>`• ${t.name}（${t.date}）`).join('<br>')}</div>`;
      }else{
        el.innerHTML='<span style="color:var(--amber)">⚠️ 未找到有效任務，請確認欄位格式</span>';
      }
    }catch(err){el.innerHTML=`<span style="color:var(--red)">❌ 解析失敗：${err.message}</span>`;}
  };
  reader.readAsArrayBuffer(file);
}

function previewImport(){

    ✅ 將匯入 <strong>${tasks.length}</strong> 筆任務：<br>

}
function confirmImport(){
  const isExcel=document.getElementById('import-tab-excel')&&document.getElementById('import-tab-excel').style.display!=='none';
  const{tasks,errors}=isExcel?{tasks:_excelParsedTasks,errors:[]}:parseImportText();
  if(errors.length){previewImport();return;}
  if(!tasks.length){alert('沒有可匯入的任務');return;}
  data.tasks=[...data.tasks,...tasks];
  saveData(data);renderAll();closeModal();
  alert(`✅ 成功匯入 ${tasks.length} 筆任務！`);
}
